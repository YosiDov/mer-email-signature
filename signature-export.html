<script>
  // ── 1. Read data from URL ──────────────────────────────────────────────
  // Tries three strategies in order:
  //   a) ?d=  percent-encoded JSON  (v2 Power Apps — EncodeUrl(JSON(...)))
  //   b) ?sig= Base64URL token      (v1 fallback — query string)
  //   c) #sig= Base64URL token      (v1 fallback — fragment)
  function readData() {
    const search = new URLSearchParams(location.search);

    // (a) v2: ?d=<percent-encoded JSON>
    // URLSearchParams.get() automatically decodes percent-encoding
    const d = search.get('d');
    if (d) {
      try { return JSON.parse(d); } catch(e) { console.error('?d parse:', e); }
    }

    // (b)+(c) v1: Base64URL token from query string or fragment
    const hash = new URLSearchParams(location.hash.replace(/^#/, ''));
    const sig  = search.get('sig') || hash.get('sig') || '';
    if (sig) {
      try {
        let b64 = decodeURIComponent(sig).replace(/-/g, '+').replace(/_/g, '/');
        while (b64.length % 4) b64 += '=';
        return JSON.parse(decodeURIComponent(escape(atob(b64))));
      } catch(e) { console.error('#sig decode:', e); }
    }

    return {};
  }

  // ── 2. Fill the card ───────────────────────────────────────────────────
  const data = readData();

  function setText(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = (value || '').trim();
  }
  setText('sig-name',    data.name    || '');
  setText('sig-title',   data.title   || '');
  setText('sig-company', data.company || 'C. Mer Industries Ltd');
  setText('sig-phone',   data.phone   || '');
  setText('sig-email',   data.email   || '');

  // ── 3. Capture → download → close ─────────────────────────────────────
  async function run() {
    await document.fonts.ready;

    const card = document.getElementById('signature-card');
    const canvas = await html2canvas(card, {
      scale: 3,
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
      logging: false
    });

    const link = document.createElement('a');
    const safeName = (data.name || 'signature').replace(/\s+/g, '-').toLowerCase();
    link.download = 'mer-signature-' + safeName + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();

    // Close the tab after the download has had time to start
    setTimeout(() => window.close(), 800);
  }

  window.addEventListener('load', run);
</script>
